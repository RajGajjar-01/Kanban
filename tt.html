<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Writing Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <p class="writing-vertical-rl text-2xl font-bold bg-gray-200 p-4">
        Vertical Text (Right-to-Left)
    </p>

    <p class="writing-vertical-lr text-2xl font-bold bg-gray-200 p-4 mt-8">
        Vertical Text (Left-to-Right)
    </p>

    <p class="writing-horizontal text-2xl font-bold bg-gray-200 p-4 mt-8">
        Horizontal Text
    </p>
</body>
</html>

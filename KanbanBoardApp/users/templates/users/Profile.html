{% extends "board/Base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold text-center text-gray-900 mb-8">Profile Settings</h1>
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
        <!-- Profile Image Section -->
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-6 sm:p-10">
            <div class="flex flex-col sm:flex-row items-center">
                <div class="relative mb-4 sm:mb-0 sm:mr-6">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/Screenshot%20from%202025-02-05%2000-12-34-rRqr8eSdWd2OgRGMOBqorXPpRB4ez1.png"
                        alt="Profile picture"
                        class="w-32 h-32 rounded-full border-4 border-white shadow-lg object-cover">
                    <label for="image-upload"
                        class="absolute bottom-0 right-0 bg-white text-blue-600 p-2 rounded-full cursor-pointer hover:bg-gray-100 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <input type="file" id="image-upload" class="hidden" accept="image/*">
                    </label>
                </div>
                <div class="text-center sm:text-left">
                    <h2 class="text-2xl font-semibold text-white">Raj</h2>
                    <p class="text-blue-100">Member since 2023</p>
                </div>
            </div>
        </div>

        <!-- Form Section -->
        <form class="p-6 sm:p-10 space-y-6">
            <!-- Username Field -->
            <div class="space-y-2">
                <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" id="username" name="username" value="raj"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                <p class="text-sm text-gray-500">Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only.
                </p>
            </div>

            <!-- Email Field -->
            <div class="space-y-2">
                <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                <input type="email" id="email" name="email" value="atlantic.march11@gmail.com"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
            </div>

            <!-- Bio Field -->
            <div class="space-y-2">
                <label for="bio" class="block text-sm font-medium text-gray-700">About myself</label>
                <textarea id="bio" name="bio" rows="4"
                    class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border"
                    placeholder="Tell us about yourself"></textarea>
            </div>

            <!-- Additional Fields -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="location" class="block text-sm font-medium text-gray-700">Location</label>
                    <input type="text" id="location" name="location" placeholder="City, Country"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                </div>
                <div class="space-y-2">
                    <label for="website" class="block text-sm font-medium text-gray-700">Website</label>
                    <input type="url" id="website" name="website" placeholder="https://example.com"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border">
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors text-sm font-medium">
                    Update Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock content %}

{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar Fix</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="{% static 'board/main.css' %}" />
    <link rel="stylesheet" type="text/css" href="{% static 'board/header.css' %}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
      <div class="container">
        <a class="navbar-brand" href="#">Logo</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item nav-style">
              <a class="nav-link" href="#">Features</a>
            </li>
            <li class="nav-item nav-style">
              <a class="nav-link" href="#">About Us</a>
            </li>
            <li class="nav-item nav-style">
              <a class="nav-link" href="#">Contact</a>
            </li>
            <li class="nav-item">
                <button type="button" class="nav-button">Sign in</button>
            </li>
            <li class="nav-item">
                <button type="button" class="nav-button">Get Started</button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

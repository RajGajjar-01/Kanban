{% load static tailwind_tags %}
{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% tailwind_css %}

    {% if title %}
        <title>{{ title }} | Logo</title>
    {% else %}
        <title>Logo</title>
    {% endif %}

</head>

<body>
    <div>
        {% block content %}{% endblock %}
    </div>
</body>

</html>

{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    {% if title %}
    <title>{{ title }} | Logo</title>
    {% else %}
    <title>Logo</title>
    {% endif %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primary: "#6C63FF",
                "hero-purple": "#B4B1E8",
                "button-purple": "#6C63FF",
                "hero-purple": "#B4B1E8",
                "feature-red": "#FF6B6B",
                "feature-purple": "#6C63FF",
                "feature-green": "#4CD964",
                "feature-yellow": "#FFB946",
              },
              fontFamily: {
                sans: ["Inter", "sans-serif"],
              },
            },
          },
        };
      </script>
    <style>
        body{
            overflow-x: hidden;
        }

        /* Custom scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            /* Width of the scrollbar */
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            /* Color of the track */
            border-radius: 4px;
            /* Rounded corners for the track */
        }

        ::-webkit-scrollbar-thumb {
            background: #FB7185;
            /* Color of the scrollbar thumb */
            border-radius: 4px;
            /* Rounded corners for the thumb */
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
            /* Color of the scrollbar thumb on hover */
        }

          /* Hide horizontal scrollbar */
    .hide-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
      /* Chrome, Safari, and Opera */
    }
    </style>
</head>

<body style="font-family: 'Poppins';">
    <div>
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
        </script>
    <script src="{% static 'js/toDo.js' %}" type="module"></script>
    <script src="{% static 'js/boardIn.js' type="module" %}"></script>
</body>

</html>

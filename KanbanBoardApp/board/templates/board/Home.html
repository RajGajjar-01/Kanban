{% extends "board/Base.html" %}

{% block content %}
    <div class="font-poppins">
        <nav class="fixed w-full px-6 py-4 bg-slate-50 shadow-md" data-aos="fade-down" data-aos-duration="300">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <!-- Logo -->
                <a href="{% url 'board-landing' %}" class="text-[2.4rem] font-bold text-black">Logo</a>
    
                <!-- Mobile Menu Button -->
                <button class="md:hidden p-2" id="mobile-menu-button">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                        </path>
                    </svg>
                </button>
    
                <!-- Navigation Links - Modified for mobile -->
                <div class="hidden md:flex items-center space-x-8" id="mobile-menu">
                    <div class="md:flex md:items-center md:space-x-8 absolute md:relative left-0 right-0 top-[72px] md:top-0 md:bg-transparent p-4 md:p-0 border-b md:border-0 flex flex-col md:flex-row space-y-4 md:space-y-0">
                        <a href="#" class="text-gray-700 hover:text-gray-950 transition-colors">Blogs</a>
    
                        <!-- Buttons -->
                        <a href="{% url 'user-profile' %}"
                            class="px-6 py-4 font-semibold bg-violet-500 rounded-[50%] text-white transition-all">
                            {{user_initial}}
                        </a>
                    </div>
                </div>
            </div>
        </nav>
        <div class="pt-[5.8rem]">

        </div>
        <div class="flex h-screen">
            <!-- Sidebar -->
            <div class="w-64 bg-white border-r h-full flex flex-col">
                <!-- Workspace Header -->
                <div class="p-4 border-b">
                    <div class="flex items-center justify-between">
                        <h2 class="font-semibold text-lg">Workspaces</h2>
                        <button id="addWorkspaceBtn" class="p-2 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                    </div>
                </div>
    
                <!-- Workspace List -->
                <div id="workspaceList" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <!-- Workspaces will be added here dynamically -->
                </div>
            </div>
    
            <!-- Main Content -->
            <div class="flex-1 flex flex-col">
                <!-- Header -->
                <header class="bg-white border-b p-4">
                    <h1 id="currentWorkspaceTitle" class="text-xl font-semibold">Select a Workspace</h1>
                </header>
    
                <!-- Content Area -->
                <main class="flex-1 overflow-auto p-6">
                    <!-- Tabs -->
                    <div id="workspaceTabs" class="hidden mb-6">
                        <div class="border-b">
                            <nav class="flex space-x-8">
                                <button class="tab-btn active px-4 py-2 border-b-2 border-transparent" data-tab="boards">
                                    Boards
                                </button>
                                <button class="tab-btn px-4 py-2 border-b-2 border-transparent" data-tab="members">
                                    Members
                                </button>
                                <button class="tab-btn px-4 py-2 border-b-2 border-transparent" data-tab="activities">
                                    Activities
                                </button>
                            </nav>
                        </div>
                    </div>
    
                    <!-- Boards Grid -->
                    <div id="boardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <!-- Boards will be added here dynamically -->
                        <button id="addBoardBtn" class="h-48 border-2 border-dashed rounded-lg flex items-center justify-center hover:bg-gray-50 transition-colors">
                            <div class="text-center">
                                <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                <span class="text-gray-500">Add Board</span>
                            </div>
                        </button>
                    </div>
                </main>
            </div>
        </div>
    
        <!-- Modals -->
        <!-- Add Workspace Modal -->
        <div id="addWorkspaceModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white rounded-lg p-6 w-full max-w-md">
                <h3 class="text-lg font-semibold mb-4">Create New Workspace</h3>
                <form id="addWorkspaceForm">
                    <div class="mb-4">
                        <label id="{{workspace_modal.workspace_name.id_for_label}}" class="block text-sm font-medium mb-1">Workspace Name</label>
                        {{workspace_modal.workspace_name}}
                    </div>
                    <div class="flex justify-end space-x-2">
                        <button type="button" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" onclick="closeModal('addWorkspaceModal')">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Continue</button>
                    </div>
                </form>
            </div>
        </div>
    
        <!-- Add Board Modal -->
        <div id="addBoardModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white rounded-lg p-6 w-full max-w-md">
                <h3 class="text-lg font-semibold mb-4">Create New Board</h3>
                <form id="addBoardForm">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Board Title</label>
                            <input type="text" required class="w-full p-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Description</label>
                            <textarea class="w-full p-2 border rounded-lg" rows="3"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Theme Color</label>
                            <input type="color" class="w-full p-1 border rounded-lg">
                        </div>
                    </div>
                    <div class="flex justify-end space-x-2 mt-6">
                        <button type="button" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" onclick="closeModal('addBoardModal')">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Continue</button>
                    </div>
                </form>
            </div>
        </div>
    
        <!-- Add Task Modal -->
        <div id="addTaskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
            <div class="bg-white rounded-lg p-6 w-full max-w-md">
                <h3 class="text-lg font-semibold mb-4">Create New Task</h3>
                <form id="addTaskForm">
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-1">Task Title</label>
                        <input type="text" required class="w-full p-2 border rounded-lg">
                    </div>
                    <div class="flex justify-end space-x-2">
                        <button type="button" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" onclick="closeModal('addTaskModal')">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Continue</button>
                    </div>
                </form>
            </div>
        </div>
    
    </div>
{% endblock content %}
